<main>
    <div class="container">
        <form (ngSubmit)="submitSignup()">
            <h2>Sign Up</h2>
            <label for="name">Name:</label>
            <input type="text" name="name" [(ngModel)]="user.username">
        
            <label for="email">Email:</label>
            <input type="email" name="email" [(ngModel)]="user.email">
        
            <label for="password">Password:</label>
            <input type="password" name="password" [(ngModel)]="user.password">
            
            <button type="submit">Sign up</button>
        </form>
        <form [style.visibility]="visibility" (ngSubmit)="submitVerification()">
            <label for="code">Verification code :</label>
            <input type="text" name="code" [(ngModel)]="verificationRequest.verificationCode">
            <button type="submit">Verify</button>
        </form>
    </div>
</main>
